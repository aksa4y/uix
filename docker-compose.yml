services:
  3xui:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: 3xui_app
    # hostname: yourhostname  # опционально
    # Ограничение памяти (опционально)
    # mem_limit: 512m
    
    # Fail2ban требует NET_ADMIN для ограничения IP через iptables
    cap_add:
      - NET_ADMIN
      - NET_RAW
    
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
      # Настройки памяти
      # XUI_GOGC: "75"
      # XUI_MEMORY_LIMIT: "400"
      # XUI_INIT_WEB_BASE_PATH: "/"
      # XUI_PORT: "8080"
      
      # Для PostgreSQL раскомментируйте и запустите:
      # docker compose --profile postgres up -d
      # XUI_DB_TYPE: "postgres"
      # XUI_DB_DSN: "postgres://xui:xui@postgres:5432/xui?sslmode=disable"
    
    tty: true
    ports:
      - "2053:2053"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: 3xui_postgres
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: xui
      POSTGRES_PASSWORD: xui
      POSTGRES_DB: xui
    volumes:
      - $PWD/pgdata/:/var/lib/postgresql/data
    restart: unless-stopped